services:
  db:
    image: postgres:18
    container_name: postgres-workout-tracker
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      # Mount to /var/lib/postgresql to support pg_upgrade between major versions
      - postgres_data:/var/lib/postgresql
    # Optional: Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:   